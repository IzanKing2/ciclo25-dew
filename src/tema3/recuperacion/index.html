<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IzanShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    
    <div class="wrapper">
        <aside>
            <header>
                <h1 class="logo">IzanShop</h1>
            </header>
            <nav>
                <ul class="menu">
                    <li>
                        <button id="todos" class="btn-menu btn-cat active"><i class="bi bi-hand-index-thumb-fill"></i> Todos los productos</button>
                    </li>
                    <li>
                        <button id="0" class="btn-menu btn-cat"><i class="bi bi-hand-index-thumb"></i> Ordenadores</button>
                    </li>
                    <li>
                        <button id="1" class="btn-menu btn-cat"><i class="bi bi-hand-index-thumb"></i> Periféricos</button>
                    </li>
                    <li>
                        <button id="2" class="btn-menu btn-cat"><i class="bi bi-hand-index-thumb"></i> Consolas</button>
                    </li>
                    <li>
                        <a class="btn-menu btn-cart" href="./cart.html"><i class="bi bi-cart-fill"></i> Carrito <span class="num">0</span></a>
                    </li>
                    <li>
                        <a class="btn-menu btn-admin" href="./dashboard.html"><i class="bi bi-gear-wide"></i> Panel Adimin</a>
                    </li>
                    <li>
                        <button type="submit" class="btn-menu btn-logout" id="logoutBtn">Cerrar Sesión</button>
                    </li>
                </ul>
            </nav>
            <footer>
                <p class="text-footer">&copy; 2026 Izan Coder</p>
            </footer>
        </aside>
        <main>
            <h2 class="main-title" id="mainTitle">Todos los productos</h2>
            <div id="productCont" class="product-container">
                <!-- Esto se rellena dinámicamente -->
            </div>
        </main>
    </div>

    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/auth.js"></script>
    <script type="module">
        import { logout } from './js/auth.js';

        const logoutBtn = document.querySelector('#logoutBtn');

        logoutBtn.addEventListener('click', function() {
            logout();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
